name: Nightly

on:
  push:
    branches:
      - devel

jobs:
  nightly:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.2.6'
      
      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install cmake binutils-arm-linux-gnueabihf -y
          rustup target add armv7-unknown-linux-musleabihf
          cargo install cargo-zigbuild
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      
      - name: Install Nim zigcc wrapper
        run: nimble install zigcc
      
      - name: Get commit hash
        id: hash
        run: |
          HASH=$(git rev-parse --short=8 HEAD)
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "Commit: $HASH"
    
      - name: Build nightly
        run: NIGHTLY=1 nimble updater -y
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Quark-${{ steps.hash.outputs.hash }}-BASE
          path: Quark-${{ steps.hash.outputs.hash }}-BASE.zip
          retention-days: 30

      - name: Upload OTA update file via SFTP
        uses: Dylan700/sftp-upload-action@latest
        with:
          server: q.sartor.vip
          username: debian
          key: ${{secrets.SFTP_KEY}}
          port: 22
          uploads: |
            ./Quark-${{ steps.hash.outputs.hash }}-Updater.zip => /var/www/qstore/store/packages/vip.sartor.q.nightly.zip

